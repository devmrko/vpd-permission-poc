<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('테이블/뷰 관리')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="container py-4">
  <div class="page-title">
    <h1>테이블/뷰 관리</h1>
    <p>권한에 사용할 보호 객체와 이미 구성된 ORDS 조회 경로를 매핑합니다.</p>
  </div>

  <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
  <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

  <section class="content-band">
    <h2>테이블/뷰 추가</h2>
    <form method="post" action="/objects" class="form-grid">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <label>
        DB 객체 선택
        <select class="form-select" id="objectCatalogSelect">
          <option value="">직접 입력</option>
          <option th:each="dbObject : ${dbObjects}"
                  th:value="${dbObject.value()}"
                  th:data-owner="${dbObject.owner()}"
                  th:data-object-name="${dbObject.objectName()}"
                  th:text="${dbObject.label()}"></option>
        </select>
      </label>
      <label>
        Owner
        <input class="form-control" name="owner" value="ADMIN" autocomplete="off" required>
      </label>
      <label>
        Object
        <input class="form-control" name="objectName" placeholder="CB_V_SEARCH_DOCUMENTS" autocomplete="off" required>
      </label>
      <label>
        ORDS Path
        <input class="form-control" name="ordsPath" placeholder="cb-ords/cb-agent-security/vpd/documents" required>
      </label>
      <label>
        컬럼
        <input class="form-control" name="columns" placeholder="DOC_ID,TITLE,CONTENTS">
      </label>
      <label>
        민감 컬럼
        <input class="form-control" name="sensitiveColumns" placeholder="CONTENTS">
      </label>
      <button class="btn btn-primary" type="submit">추가</button>
    </form>
  </section>

  <section class="content-band">
    <h2>등록된 테이블/뷰</h2>
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead>
        <tr>
          <th>ID</th>
          <th>Owner</th>
          <th>Object</th>
          <th>ORDS Path</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="object : ${objects}">
          <td th:text="${object.objectId()}">1</td>
          <td th:text="${object.owner()}">ADMIN</td>
          <td th:text="${object.objectName()}">CB_V_SEARCH_DOCUMENTS</td>
          <td>
            <form method="post" action="/objects/ords-path" class="inline-form">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="objectId" th:value="${object.objectId()}">
              <input class="form-control form-control-sm" name="ordsPath" th:value="${object.ordsPath()}" required>
              <button class="btn btn-sm btn-outline-primary" type="submit">저장</button>
            </form>
          </td>
          <td>
            <form method="post" action="/objects/disable" class="inline-form">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="objectId" th:value="${object.objectId()}">
              <button class="btn btn-sm btn-outline-danger" type="submit">비활성화</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(objects)}">
          <td colspan="5" class="text-muted">등록된 테이블/뷰가 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
</body>
</html>
